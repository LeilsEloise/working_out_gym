{% extends 'base.html' %}

{% block content %}
  <h1>Badge Details</h1>

  {% if badge %}
    <div class="badge-detail">
      {% if badge.image %}
        <img src="{{ badge.image.url }}" alt="{{ badge.name }}">
      {% endif %}
      <h2>{{ badge.name }}</h2>
      <p>{{ badge.description }}</p>
    </div>
  {% else %}
    <p>The requested badge does not exist.</p>
  {% endif %}
{% endblock %}
