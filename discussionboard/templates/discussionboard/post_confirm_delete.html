{% extends "base.html" %}


{% block content %}
<div class="container my-4" style="max-width: 720px;">
  <h2 class="mb-3">Delete post</h2>
  <p>Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Yes, delete</button>
    <a class="btn btn-outline-secondary" href="{% url 'discussionboard:post_detail' object.slug %}">Cancel</a>
  </form>
</div>
{% endblock %}
