{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-4">
  <h3>Edit comment</h3>

  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-secondary" href="{% url 'discussionboard:post_detail' object.Post.slug %}">Cancel</a>
  </form>
</div>
{% endblock %}
