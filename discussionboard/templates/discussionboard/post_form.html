{% extends "base.html" %}
{% block content %}
<div class="container my-4" style="max-width: 720px;">
  <h2 class="mb-3">{{ view.object|default:"New Post" }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success" type="submit">Save</button>
    <a class="btn btn-outline-secondary" href="{% url 'discussionboard:post_list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
